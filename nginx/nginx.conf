server {
    listen 80;
    server_name saqrai.com www.saqrai.com 187-124-191-149.sslip.io _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name saqrai.com www.saqrai.com 187-124-191-149.sslip.io _;

    ssl_certificate /etc/letsencrypt/live/saqrai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saqrai/privkey.pem;

    client_max_body_size 10m;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    gzip on;
    gzip_types text/css application/javascript application/json text/plain;

    # All /api/* calls (from both React frontends, same-origin) go straight
    # to the dashboard service - this is what makes CORS unnecessary in
    # production.
    location /api/ {
        proxy_pass http://dashboard:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The original Token Station + System Benchmark pages (static HTML/JS,
    # built earlier this project) stay reachable at /legacy/ for direct
    # access to the full benchmark suite UI.
    location /legacy/ {
        proxy_pass http://dashboard:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SAMA Compliance & Benchmark Suite - moved off the root, now lives at
    # /benchmark/.
    location /benchmark/ {
        proxy_pass http://benchmark-frontend:80/benchmark/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SAQR AI Financial Crime Investigation Platform - default public root.
    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
